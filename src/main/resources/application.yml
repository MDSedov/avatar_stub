server:
  port: 7070
  tomcat:
    threads:
      max: 100
      min-spare: 20
    accept-count: 200
    max-connections: 8192

spring:
  application:
    name: avatar-stub

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

avatar:
  # server | generate
  mode: server

  # Directory with generated JPEG avatars.
  dir: ./data/avatars

  # Used by generate mode.
  generate-count: 230000
  width: 550
  height: 550
  target-size-kb: 40

  # Safety limit for HTTP generation endpoint.
  # For full 230000 pool prefer command mode, not HTTP endpoint.
  admin-prepare-max-count: 10000
